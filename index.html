<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 AI | 프리미엄 분석 대시보드</title>
    <link rel="stylesheet" href="static/css/style.css?v=3.4">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // 메인 JS 로드 전 슬라이더 기본 동작 보장
        window.handleSliderInput = function (value) {
            const display = document.getElementById('round-display');
            if (display) display.innerText = `${value}회`;

            const slider = document.getElementById('round-selector');
            if (slider) {
                const min = parseInt(slider.min) || 1;
                const max = parseInt(slider.max) || 1200;
                const percent = ((value - min) / (max - min)) * 100;
                slider.style.setProperty('--p', `${percent}%`);
            }
        };
    </script>
</head>

<body>
    <div class="bg-mesh"></div>

    <div id="loader">
        <div class="spinner-outer">
            <div class="spinner-inner"></div>
        </div>
        <div class="loading-text">미래의 숫자를 계산 중...</div>
    </div>



    <!-- Prediction Section -->
    <section id="prediction-section" class="dashboard-section">
        <div class="container">
            <div class="section-header-premium">
                <div class="section-tag">LIVE PREDICTION</div>
                <h2 id="round-header">분석 결과 로딩 중...</h2>
            </div>

            <div class="dashboard-grid">

                <!-- Frequency Chart -->
                <div class="card card-full">
                    <div class="card-title">📊 번호별 출현 빈도</div>
                    <div class="chart-container">
                        <canvas id="frequencyChart"></canvas>
                    </div>
                </div>

                <!-- Main Predictions -->
                <div class="card card-full">
                    <div class="card-header-flex">
                        <div class="card-title">🎯 앙상블 추천 조합</div>
                        <div class="set-selector">
                            <label for="set-count">개수:</label>
                            <select id="set-count" onchange="window.updateSetCount(this.value)">
                                <option value="5" selected>5개</option>
                                <option value="10">10개</option>
                                <option value="30">30개</option>
                                <option value="50">50개</option>
                                <option value="100">100개</option>
                            </select>
                        </div>
                    </div>
                    <div id="prediction-sets" class="prediction-sets"></div>
                </div>

            </div>
        </div>
    </section>

    <div class="section-divider"></div>

    <!-- History Section -->
    <section id="history-section" class="dashboard-section">
        <div class="container-full">
            <div class="section-header-premium">
                <div class="section-tag">HISTORICAL ANALYSIS</div>
                <h2>과거 회차 기록 분석</h2>
            </div>

            <div class="dashboard-grid">
                <!-- Historical Match Analysis -->
                <div class="card card-full">
                    <div class="round-slider-container">
                        <div class="slider-header" style="justify-content: center;">
                            <span id="round-display" class="round-number-badge">-회</span>
                        </div>
                        <div class="progress-slider-wrapper">
                            <input type="range" id="round-selector" class="premium-slider" min="2" max="1200" step="1"
                                style="--p: 100%;"
                                oninput="window.handleSliderInput(this.value); window.searchRound(false)">
                        </div>
                        <div class="slider-footer">
                            <span>2회</span>
                            <span id="max-round-label">-회</span>
                        </div>

                        <!-- 회차 이동 버튼 추가 -->
                        <div class="round-nav-btns">
                            <button onclick="window.moveRound(-1)" class="btn-round-nav">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                                이전
                            </button>
                            <button onclick="window.moveRound(1)" class="btn-round-nav">
                                다음
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div id="winning-numbers-display" class="winning-display-banner"
                        style="margin-top: 1.5rem; text-align: center;">
                        <!-- 실제 당첨번호 표시 영역 -->
                    </div>
                    <div id="match-summary-container" class="match-canvas-container"
                        style="display: none; margin-bottom: 2rem;">
                        <div class="card-title">📊 분석 적중 통계</div>
                        <div class="chart-container" style="height: 200px;">
                            <canvas id="matchAnalysisChart"></canvas>
                        </div>
                    </div>
                    <div id="match-results-list" class="match-results-list">
                        <!-- JS: Match cards will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Lotto AI Systems. All rights reserved.</p>
            <p class="disclaimer">본 시스템의 예측 결과는 통계 및 데이터 분석에 기반하며, 당첨을 보장하지 않습니다.</p>
        </div>
    </footer>

    <script src="static/js/main.js?v=3.8"></script>
</body>

</html>
